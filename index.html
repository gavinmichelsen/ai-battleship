<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship vs AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Battleship</h1>
            <div id="status-message">Place your ships to begin!</div>
        </header>

        <div class="controls-panel">
            <div class="setup-controls" id="setup-controls">
                <button id="rotate-btn">Rotate Ship (Current: Horizontal)</button>
                <button id="randomize-btn">Randomize Fleet</button>
                <div class="difficulty-selector">
                    <label for="ai-difficulty">AI Difficulty:</label>
                    <select id="ai-difficulty">
                        <option value="easy">Easy (Random)</option>
                        <option value="medium">Medium (Hunt & Target)</option>
                        <option value="hard">Hard (Strategic)</option>
                    </select>
                </div>
                <button id="start-btn" disabled>Start Game</button>
            </div>
            <div class="game-controls hidden" id="game-controls">
                <button id="restart-btn">Restart Game</button>
            </div>
        </div>

        <div class="game-area">
            <div class="board-container">
                <h2>Your Fleet</h2>
                <div id="player-board" class="board"></div>
            </div>
            
            <div class="board-container">
                <h2>Enemy Fleet</h2>
                <div id="enemy-board" class="board disabled"></div>
            </div>
        </div>

        <div class="fleet-status hidden" id="fleet-status">
            <div class="player-ships-status">
                <h3>Your Ships</h3>
                <ul id="player-ship-list"></ul>
            </div>
            <div class="enemy-ships-status">
                <h3>Enemy Ships</h3>
                <ul id="enemy-ship-list"></ul>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script src="ai.js"></script>
    <script src="main.js"></script>
</body>
</html>
